# separate terms of service, privacy policy, and support
# documentation.
name: MSBuild1

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022   # pinned: windows-latest now points to a newer image
                             # whose default SDK build doesn't match this project

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Check if WDK kernel headers are present
      id: wdk_check
      shell: pwsh
      run: |
        $sdkRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\Include'
        $found = Get-ChildItem $sdkRoot -Directory -ErrorAction SilentlyContinue |
          ForEach-Object { Test-Path (Join-Path $_.FullName 'km\ntddk.h') } |
          Where-Object { $_ -eq $true }
        $present = [bool]$found
        "present=$present" >> $env:GITHUB_OUTPUT
        Write-Host "WDK km headers present: $present"

    - name: Install Windows Driver Kit (WDK)
      if: steps.wdk_check.outputs.present != 'true'
      shell: pwsh
      run: |
        choco install windowsdriverkit10 -y --no-progress
        $vsixPath = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Vsix" -Recurse -Filter "WDK.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($vsixPath) {
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\resources\app\ServiceHub\Services\Microsoft.VisualStudio.Setup.Service\VSIXInstaller.exe"
          & $vsInstaller /q /a $vsixPath.FullName
        } else {
          Write-Warning "WDK.vsix not found after install; MSBuild may still be missing WDK targets."
        }

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}
      continue-on-error: true

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # WindowsTargetPlatformVersion=10.0 (no full build number) tells MSBuild
      # to resolve to whatever SDK version is actually installed on the runner,
      # instead of failing on the exact version hardcoded in the .vcxproj.
      run: >
        msbuild /m
        /p:Configuration=${{env.BUILD_CONFIGURATION}}
        /p:WindowsTargetPlatformVersion=10.0
        /verbosity:minimal
        ${{env.SOLUTION_FILE_PATH}}

    - name: Locate build outputs
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        $patterns = @("*.dll", "*.sys", "*.vxd", "*.lib", "*.exe", "*.pdb")
        foreach ($p in $patterns) {
          Get-ChildItem -Recurse -Include $p -Path . -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\(Release|Debug)\\" } |
            Copy-Item -Destination artifacts -Force
        }
        Get-ChildItem artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WinRing0-build-${{env.BUILD_CONFIGURATION}}
        path: artifacts/*
        if-no-files-found: warn
        retention-days: 30
